<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest - Question Engine Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .card { margin-bottom: 1rem; }
        #api-example { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
        .badge-easy { background-color: #198754; }
        .badge-moderate { background-color: #ffc107; color: #000; }
        .badge-hard { background-color: #dc3545; }
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
    </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-patch-question"></i> Quest Admin</span>
        <span class="text-light small" id="token-status">No token</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2">
            <div class="nav flex-column nav-pills" role="tablist">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-banks">
                    <i class="bi bi-collection"></i> Question Banks
                </button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-questions">
                    <i class="bi bi-question-circle"></i> Questions
                </button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-test">
                    <i class="bi bi-play-circle"></i> Test Questions
                </button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-config">
                    <i class="bi bi-gear"></i> Configuration
                </button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-api">
                    <i class="bi bi-code-slash"></i> API Examples
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
            <div class="tab-content">

                <!-- Question Banks Tab -->
                <div class="tab-pane fade show active" id="tab-banks">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>Question Banks</h4>
                        <button class="btn btn-primary btn-sm" onclick="showCreateBankModal()">
                            <i class="bi bi-plus-circle"></i> New Bank
                        </button>
                    </div>
                    <div id="banks-list"></div>
                </div>

                <!-- Questions Tab -->
                <div class="tab-pane fade" id="tab-questions">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>Questions <small class="text-muted" id="current-bank-name"></small></h4>
                        <div>
                            <select id="bank-select" class="form-select form-select-sm d-inline-block w-auto me-2" onchange="loadQuestions()"></select>
                            <button class="btn btn-success btn-sm me-1" onclick="showCreateQuestionModal()"><i class="bi bi-plus-circle"></i> Add</button>
                            <button class="btn btn-outline-secondary btn-sm me-1" onclick="exportQuestions()"><i class="bi bi-download"></i> Export</button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('import-file').click()"><i class="bi bi-upload"></i> Import</button>
                            <input type="file" id="import-file" class="d-none" accept=".json" onchange="importQuestions(event)">
                        </div>
                    </div>
                    <div id="questions-list"></div>
                </div>

                <!-- Test Questions Tab -->
                <div class="tab-pane fade" id="tab-test">
                    <h4>Test Questions</h4>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <select id="test-bank-select" class="form-select form-select-sm" onchange="loadTestQuestions()"></select>
                        </div>
                        <div class="col-md-4">
                            <select id="test-question-select" class="form-select form-select-sm" onchange="showTestQuestion()"></select>
                        </div>
                    </div>
                    <div id="test-area" class="d-none">
                        <div class="card">
                            <div class="card-body">
                                <h5 id="test-q-title"></h5>
                                <span id="test-q-badge" class="badge me-1"></span>
                                <span id="test-q-diff" class="badge"></span>
                                <p class="mt-2" id="test-q-desc"></p>
                                <div id="test-mc-options" class="d-none mb-3"></div>
                                <div id="test-text-input" class="mb-3">
                                    <textarea id="test-answer" class="form-control" rows="3" placeholder="Your answer..."></textarea>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-primary" onclick="submitTestAnswer()"><i class="bi bi-send"></i> Submit</button>
                                    <button class="btn btn-outline-warning" onclick="getTestHint()"><i class="bi bi-lightbulb"></i> Hint</button>
                                </div>
                                <div id="test-result" class="mt-3 d-none"></div>
                                <div id="test-hint" class="mt-3 d-none"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Configuration Tab -->
                <div class="tab-pane fade" id="tab-config">
                    <h4>Global Configuration</h4>
                    <div id="config-list"></div>
                </div>

                <!-- API Examples Tab -->
                <div class="tab-pane fade" id="tab-api">
                    <h4>API Usage Examples</h4>
                    <p class="text-muted">Use these curl examples to interact with the Quest API. Replace <code>&lt;TOKEN&gt;</code> with your JWT token.</p>
                    <div class="mb-3">
                        <label class="form-label">Your current token:</label>
                        <input type="text" class="form-control form-control-sm font-monospace" id="api-token-display" readonly>
                    </div>
                    <div id="api-examples-content"></div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Create Bank Modal -->
<div class="modal fade" id="bankModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="bankModalTitle">New Question Bank</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-bank-id">
                <div class="mb-3">
                    <label class="form-label">Bank Name</label>
                    <input type="text" class="form-control" id="bank-name" placeholder="e.g. Python, Java, AWS">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveBank()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Question Modal -->
<div class="modal fade" id="questionModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="questionModalTitle">New Question</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-question-id">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="q-category" onchange="toggleQuestionFields()">
                            <option value="General">General Knowledge</option>
                            <option value="MultipleChoice">Multiple Choice</option>
                            <option value="Coding">Coding</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Difficulty</label>
                        <select class="form-select" id="q-difficulty">
                            <option value="Easy">Easy</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Question Description</label>
                    <textarea class="form-control" id="q-description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correct Answer</label>
                    <textarea class="form-control" id="q-correct-answer" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hint</label>
                    <input type="text" class="form-control" id="q-hint" placeholder="Hint or clue for the player">
                </div>
                <!-- Multiple Choice Options -->
                <div id="mc-fields" class="d-none">
                    <label class="form-label">Options (4 choices)</label>
                    <input type="text" class="form-control mb-1" id="q-opt-0" placeholder="Option A">
                    <input type="text" class="form-control mb-1" id="q-opt-1" placeholder="Option B">
                    <input type="text" class="form-control mb-1" id="q-opt-2" placeholder="Option C">
                    <input type="text" class="form-control mb-1" id="q-opt-3" placeholder="Option D">
                </div>
                <!-- Coding Fields -->
                <div id="coding-fields" class="d-none">
                    <div class="row mb-2">
                        <div class="col-md-6">
                            <label class="form-label">Sample Input (Hint)</label>
                            <textarea class="form-control" id="q-sample-input" rows="2" placeholder="{'s1': {5,6,7}, 's2': {7}}"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Sample Output (Hint)</label>
                            <textarea class="form-control" id="q-sample-output" rows="2" placeholder="{5, 6}"></textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Hidden Input</label>
                            <textarea class="form-control" id="q-hidden-input" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hidden Output</label>
                            <textarea class="form-control" id="q-hidden-output" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveQuestion()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = '';
let TOKEN = null;
let allBanks = [];
let allQuestions = [];
let currentTestQuestion = null;

// --- Auth ---
async function fetchToken() {
    const res = await fetch(`${API}/api/auth/token`, { method: 'POST' });
    const data = await res.json();
    TOKEN = data.token;
    document.getElementById('token-status').textContent = 'Token active';
    document.getElementById('api-token-display').value = TOKEN;
    return TOKEN;
}

function authHeaders() {
    return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
}

async function apiCall(url, options = {}) {
    if (!TOKEN) await fetchToken();
    options.headers = { ...authHeaders(), ...(options.headers || {}) };
    const res = await fetch(url, options);
    // Auto-refresh token
    const refreshed = res.headers.get('X-Refreshed-Token');
    if (refreshed) {
        TOKEN = refreshed;
        document.getElementById('api-token-display').value = TOKEN;
    }
    if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || JSON.stringify(err));
    }
    return res.json();
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const id = 'toast-' + Date.now();
    const bgClass = type === 'error' ? 'bg-danger' : type === 'warning' ? 'bg-warning' : 'bg-success';
    container.innerHTML += `<div id="${id}" class="toast align-items-center text-white ${bgClass} border-0" role="alert">
        <div class="d-flex"><div class="toast-body">${message}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
    const el = document.getElementById(id);
    new bootstrap.Toast(el, { delay: 4000 }).show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
}

// --- Banks ---
async function loadBanks() {
    try {
        allBanks = await apiCall(`${API}/api/banks`);
        renderBanks();
        populateBankSelects();
    } catch (e) { showToast(e.message, 'error'); }
}

function renderBanks() {
    const html = allBanks.map(b => `
        <div class="card">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <strong>${b.name}</strong>
                    <span class="badge bg-secondary ms-2">${b.question_count} questions</span>
                </div>
                <div>
                    <button class="btn btn-outline-primary btn-sm me-1" onclick="showEditBankModal(${b.id}, '${b.name}')"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteBank(${b.id})"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </div>`).join('');
    document.getElementById('banks-list').innerHTML = html || '<p class="text-muted">No question banks yet.</p>';
}

function populateBankSelects() {
    const opts = allBanks.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
    ['bank-select', 'test-bank-select'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="">Select a bank...</option>' + opts;
    });
}

function showCreateBankModal() {
    document.getElementById('bankModalTitle').textContent = 'New Question Bank';
    document.getElementById('bank-name').value = '';
    document.getElementById('edit-bank-id').value = '';
    new bootstrap.Modal(document.getElementById('bankModal')).show();
}

function showEditBankModal(id, name) {
    document.getElementById('bankModalTitle').textContent = 'Edit Question Bank';
    document.getElementById('bank-name').value = name;
    document.getElementById('edit-bank-id').value = id;
    new bootstrap.Modal(document.getElementById('bankModal')).show();
}

async function saveBank() {
    const id = document.getElementById('edit-bank-id').value;
    const name = document.getElementById('bank-name').value.trim();
    if (!name) return showToast('Name is required', 'error');
    try {
        if (id) {
            await apiCall(`${API}/api/banks/${id}`, { method: 'PUT', body: JSON.stringify({ name }) });
        } else {
            await apiCall(`${API}/api/banks`, { method: 'POST', body: JSON.stringify({ name }) });
        }
        bootstrap.Modal.getInstance(document.getElementById('bankModal')).hide();
        showToast('Bank saved');
        loadBanks();
    } catch (e) { showToast(e.message, 'error'); }
}

async function deleteBank(id) {
    if (!confirm('Delete this bank and all its questions?')) return;
    try {
        await apiCall(`${API}/api/banks/${id}`, { method: 'DELETE' });
        showToast('Bank deleted');
        loadBanks();
    } catch (e) { showToast(e.message, 'error'); }
}
</script>

<script>
// --- Questions ---
async function loadQuestions() {
    const bankId = document.getElementById('bank-select').value;
    if (!bankId) { document.getElementById('questions-list').innerHTML = ''; return; }
    try {
        allQuestions = await apiCall(`${API}/api/banks/${bankId}/questions`);
        const bank = allBanks.find(b => b.id == bankId);
        document.getElementById('current-bank-name').textContent = bank ? `(${bank.name})` : '';
        renderQuestions();
    } catch (e) { showToast(e.message, 'error'); }
}

function renderQuestions() {
    const bankId = document.getElementById('bank-select').value;
    const html = allQuestions.map(q => {
        const diffClass = q.difficulty === 'Easy' ? 'badge-easy' : q.difficulty === 'Moderate' ? 'badge-moderate' : 'badge-hard';
        const catIcon = q.category === 'Coding' ? 'bi-code-slash' : q.category === 'MultipleChoice' ? 'bi-list-check' : 'bi-chat-text';
        return `<div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <strong>#${q.question_number}</strong>
                        <span class="badge bg-primary ms-1"><i class="bi ${catIcon}"></i> ${q.category}</span>
                        <span class="badge ${diffClass} ms-1">${q.difficulty}</span>
                    </div>
                    <div>
                        <button class="btn btn-outline-primary btn-sm me-1" onclick='editQuestion(${JSON.stringify(q).replace(/'/g, "\\'")})'><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteQuestion(${bankId}, ${q.id})"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
                <p class="mt-2 mb-1">${q.description}</p>
                <small class="text-muted">Correct: ${q.times_correct} | Incorrect: ${q.times_incorrect} | Hints: ${q.times_hint_used} | Passed: ${q.times_passed}</small>
            </div>
        </div>`;
    }).join('');
    document.getElementById('questions-list').innerHTML = html || '<p class="text-muted">No questions in this bank.</p>';
}

function toggleQuestionFields() {
    const cat = document.getElementById('q-category').value;
    document.getElementById('mc-fields').classList.toggle('d-none', cat !== 'MultipleChoice');
    document.getElementById('coding-fields').classList.toggle('d-none', cat !== 'Coding');
}

function showCreateQuestionModal() {
    const bankId = document.getElementById('bank-select').value;
    if (!bankId) return showToast('Select a bank first', 'warning');
    document.getElementById('questionModalTitle').textContent = 'New Question';
    document.getElementById('edit-question-id').value = '';
    ['q-category', 'q-difficulty'].forEach(id => document.getElementById(id).selectedIndex = 0);
    ['q-description', 'q-correct-answer', 'q-hint', 'q-sample-input', 'q-sample-output', 'q-hidden-input', 'q-hidden-output'].forEach(id => document.getElementById(id).value = '');
    [0,1,2,3].forEach(i => document.getElementById(`q-opt-${i}`).value = '');
    toggleQuestionFields();
    new bootstrap.Modal(document.getElementById('questionModal')).show();
}

function editQuestion(q) {
    document.getElementById('questionModalTitle').textContent = 'Edit Question';
    document.getElementById('edit-question-id').value = q.id;
    document.getElementById('q-category').value = q.category;
    document.getElementById('q-difficulty').value = q.difficulty;
    document.getElementById('q-description').value = q.description;
    document.getElementById('q-correct-answer').value = q.correct_answer;
    document.getElementById('q-hint').value = q.hint || '';
    if (q.options) {
        q.options.forEach((o, i) => { if (i < 4) document.getElementById(`q-opt-${i}`).value = o; });
    }
    document.getElementById('q-sample-input').value = q.code_sample_input || '';
    document.getElementById('q-sample-output').value = q.code_sample_output || '';
    document.getElementById('q-hidden-input').value = q.code_hidden_input || '';
    document.getElementById('q-hidden-output').value = q.code_hidden_output || '';
    toggleQuestionFields();
    new bootstrap.Modal(document.getElementById('questionModal')).show();
}

async function saveQuestion() {
    const bankId = document.getElementById('bank-select').value;
    const qId = document.getElementById('edit-question-id').value;
    const cat = document.getElementById('q-category').value;
    const body = {
        category: cat,
        difficulty: document.getElementById('q-difficulty').value,
        description: document.getElementById('q-description').value,
        correct_answer: document.getElementById('q-correct-answer').value,
        hint: document.getElementById('q-hint').value || null,
    };
    if (cat === 'MultipleChoice') {
        body.options = [0,1,2,3].map(i => document.getElementById(`q-opt-${i}`).value).filter(Boolean);
    }
    if (cat === 'Coding') {
        body.code_sample_input = document.getElementById('q-sample-input').value || null;
        body.code_sample_output = document.getElementById('q-sample-output').value || null;
        body.code_hidden_input = document.getElementById('q-hidden-input').value || null;
        body.code_hidden_output = document.getElementById('q-hidden-output').value || null;
    }
    try {
        if (qId) {
            await apiCall(`${API}/api/banks/${bankId}/questions/${qId}`, { method: 'PUT', body: JSON.stringify(body) });
        } else {
            await apiCall(`${API}/api/banks/${bankId}/questions`, { method: 'POST', body: JSON.stringify(body) });
        }
        bootstrap.Modal.getInstance(document.getElementById('questionModal')).hide();
        showToast('Question saved');
        loadQuestions();
    } catch (e) { showToast(e.message, 'error'); }
}

async function deleteQuestion(bankId, qId) {
    if (!confirm('Delete this question?')) return;
    try {
        await apiCall(`${API}/api/banks/${bankId}/questions/${qId}`, { method: 'DELETE' });
        showToast('Question deleted');
        loadQuestions();
    } catch (e) { showToast(e.message, 'error'); }
}

async function exportQuestions() {
    const bankId = document.getElementById('bank-select').value;
    if (!bankId) return showToast('Select a bank first', 'warning');
    try {
        const data = await apiCall(`${API}/api/banks/${bankId}/questions/export`);
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `quest-export-${data.bank_name}.json`;
        a.click();
        showToast('Exported');
    } catch (e) { showToast(e.message, 'error'); }
}

async function importQuestions(event) {
    const bankId = document.getElementById('bank-select').value;
    if (!bankId) return showToast('Select a bank first', 'warning');
    const file = event.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
        const data = JSON.parse(text);
        const payload = data.questions ? data : { questions: data };
        await apiCall(`${API}/api/banks/${bankId}/questions/import`, { method: 'POST', body: JSON.stringify(payload) });
        showToast('Questions imported');
        loadQuestions();
    } catch (e) { showToast(e.message, 'error'); }
    event.target.value = '';
}
</script>

<script>
// --- Test Questions ---
async function loadTestQuestions() {
    const bankId = document.getElementById('test-bank-select').value;
    if (!bankId) return;
    try {
        const questions = await apiCall(`${API}/api/banks/${bankId}/questions`);
        const opts = questions.map(q => `<option value='${JSON.stringify(q).replace(/'/g, "&#39;")}'>#${q.question_number} - ${q.category} - ${q.description.substring(0, 60)}...</option>`).join('');
        document.getElementById('test-question-select').innerHTML = '<option value="">Select a question...</option>' + opts;
    } catch (e) { showToast(e.message, 'error'); }
}

function showTestQuestion() {
    const sel = document.getElementById('test-question-select');
    if (!sel.value) { document.getElementById('test-area').classList.add('d-none'); return; }
    const q = JSON.parse(sel.value);
    currentTestQuestion = q;
    document.getElementById('test-area').classList.remove('d-none');
    document.getElementById('test-q-title').textContent = `Question #${q.question_number}`;
    const badge = document.getElementById('test-q-badge');
    badge.textContent = q.category;
    badge.className = 'badge bg-primary me-1';
    const diff = document.getElementById('test-q-diff');
    diff.textContent = q.difficulty;
    diff.className = `badge ${q.difficulty === 'Easy' ? 'badge-easy' : q.difficulty === 'Moderate' ? 'badge-moderate' : 'badge-hard'}`;
    document.getElementById('test-q-desc').textContent = q.description;
    document.getElementById('test-result').classList.add('d-none');
    document.getElementById('test-hint').classList.add('d-none');
    document.getElementById('test-answer').value = '';

    // Multiple choice options
    const mcDiv = document.getElementById('test-mc-options');
    if (q.category === 'MultipleChoice' && q.options) {
        mcDiv.classList.remove('d-none');
        mcDiv.innerHTML = q.options.map((o, i) => `
            <div class="form-check">
                <input class="form-check-input" type="radio" name="mc-answer" id="mc-${i}" value="${o}">
                <label class="form-check-label" for="mc-${i}">${o}</label>
            </div>`).join('');
        document.getElementById('test-text-input').classList.add('d-none');
    } else {
        mcDiv.classList.add('d-none');
        document.getElementById('test-text-input').classList.remove('d-none');
    }
}

async function submitTestAnswer() {
    if (!currentTestQuestion) return;
    const bankId = document.getElementById('test-bank-select').value;
    let answer;
    if (currentTestQuestion.category === 'MultipleChoice') {
        const checked = document.querySelector('input[name="mc-answer"]:checked');
        if (!checked) return showToast('Select an answer', 'warning');
        answer = checked.value;
    } else {
        answer = document.getElementById('test-answer').value.trim();
        if (!answer) return showToast('Enter an answer', 'warning');
    }
    try {
        const result = await apiCall(`${API}/api/banks/${bankId}/questions/${currentTestQuestion.id}/answer`, {
            method: 'POST', body: JSON.stringify({ answer })
        });
        const div = document.getElementById('test-result');
        div.classList.remove('d-none');
        const alertClass = result.correct ? 'alert-success' : 'alert-danger';
        let html = `<div class="alert ${alertClass}"><strong>${result.grade}</strong>`;
        if (result.confidence !== undefined) html += ` (Confidence: ${result.confidence}%)`;
        if (result.message) html += `<br>${result.message}`;
        if (result.correct_answer) html += `<br><em>Correct answer: ${result.correct_answer}</em>`;
        if (result.hint_passed !== undefined) html += `<br>Hint test: ${result.hint_passed ? '✅' : '❌'} | Hidden test: ${result.hidden_passed ? '✅' : '❌'}`;
        html += '</div>';
        div.innerHTML = html;
    } catch (e) { showToast(e.message, 'error'); }
}

async function getTestHint() {
    if (!currentTestQuestion) return;
    const bankId = document.getElementById('test-bank-select').value;
    try {
        const hint = await apiCall(`${API}/api/banks/${bankId}/questions/${currentTestQuestion.id}/hint`);
        const div = document.getElementById('test-hint');
        div.classList.remove('d-none');
        let html = `<div class="alert alert-warning"><strong>Hint:</strong> ${hint.hint || 'No hint available'}`;
        if (hint.reduced_options) html += `<br>Remaining options: ${hint.reduced_options.join(', ')}`;
        if (hint.sample_input) html += `<br>Sample Input: <code>${hint.sample_input}</code>`;
        if (hint.sample_output) html += `<br>Expected Output: <code>${hint.sample_output}</code>`;
        html += '</div>';
        div.innerHTML = html;
        // Update MC options if reduced
        if (hint.reduced_options && currentTestQuestion.category === 'MultipleChoice') {
            const mcDiv = document.getElementById('test-mc-options');
            mcDiv.innerHTML = hint.reduced_options.map((o, i) => `
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mc-answer" id="mc-${i}" value="${o}">
                    <label class="form-check-label" for="mc-${i}">${o}</label>
                </div>`).join('');
        }
    } catch (e) { showToast(e.message, 'error'); }
}

// --- Configuration ---
async function loadConfig() {
    try {
        const configs = await apiCall(`${API}/api/config`);
        const html = configs.map(c => `
            <div class="card">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${c.key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</strong>
                        <br><small class="text-muted">${c.description || ''}</small>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="cfg-${c.key}"
                            ${c.value === 'true' ? 'checked' : ''}
                            onchange="updateConfig('${c.key}', this.checked)">
                    </div>
                </div>
            </div>`).join('');
        document.getElementById('config-list').innerHTML = html;
    } catch (e) { showToast(e.message, 'error'); }
}

async function updateConfig(key, checked) {
    try {
        await apiCall(`${API}/api/config/${key}`, {
            method: 'PUT', body: JSON.stringify({ value: checked ? 'true' : 'false' })
        });
        showToast('Configuration updated');
    } catch (e) { showToast(e.message, 'error'); }
}

// --- API Examples ---
function renderApiExamples() {
    const baseUrl = window.location.origin;
    const examples = [
        { title: 'Get JWT Token', cmd: `curl -X POST ${baseUrl}/api/auth/token` },
        { title: 'List Question Banks', cmd: `curl -H "Authorization: Bearer <TOKEN>" ${baseUrl}/api/banks` },
        { title: 'Create Question Bank', cmd: `curl -X POST -H "Authorization: Bearer <TOKEN>" -H "Content-Type: application/json" -d '{"name":"Python"}' ${baseUrl}/api/banks` },
        { title: 'List Questions', cmd: `curl -H "Authorization: Bearer <TOKEN>" ${baseUrl}/api/banks/1/questions` },
        { title: 'Create a General Knowledge Question', cmd: `curl -X POST -H "Authorization: Bearer <TOKEN>" -H "Content-Type: application/json" -d '{"category":"General","difficulty":"Easy","description":"What is the capital of France?","correct_answer":"Paris","hint":"City of Light"}' ${baseUrl}/api/banks/1/questions` },
        { title: 'Create a Multiple Choice Question', cmd: `curl -X POST -H "Authorization: Bearer <TOKEN>" -H "Content-Type: application/json" -d '{"category":"MultipleChoice","difficulty":"Easy","description":"Which planet is closest to the Sun?","correct_answer":"Mercury","options":["Venus","Mercury","Mars","Jupiter"],"hint":"Smallest planet"}' ${baseUrl}/api/banks/1/questions` },
        { title: 'Create a Coding Question', cmd: `curl -X POST -H "Authorization: Bearer <TOKEN>" -H "Content-Type: application/json" -d '{"category":"Coding","difficulty":"Easy","description":"Given sets s1 and s2, write code so result equals the difference of s1 to s2.","correct_answer":"result = s1 - s2","hint":"Use set difference","code_sample_input":"{\\\"s1\\\": {5,6,7,8,9}, \\\"s2\\\": {8,9}}","code_sample_output":"{5, 6, 7}","code_hidden_input":"{\\\"s1\\\": {40,10,20,30}, \\\"s2\\\": {40,50,30}}","code_hidden_output":"{10, 20}"}' ${baseUrl}/api/banks/1/questions` },
        { title: 'Submit Answer', cmd: `curl -X POST -H "Authorization: Bearer <TOKEN>" -H "Content-Type: application/json" -d '{"answer":"Paris"}' ${baseUrl}/api/banks/1/questions/1/answer` },
        { title: 'Get Hint', cmd: `curl -H "Authorization: Bearer <TOKEN>" ${baseUrl}/api/banks/1/questions/1/hint` },
        { title: 'Export Questions', cmd: `curl -H "Authorization: Bearer <TOKEN>" ${baseUrl}/api/banks/1/questions/export` },
    ];
    document.getElementById('api-examples-content').innerHTML = examples.map(e =>
        `<div class="card"><div class="card-body"><strong>${e.title}</strong><div id="api-example">${e.cmd}</div></div></div>`
    ).join('');
}

// --- Init ---
document.addEventListener('DOMContentLoaded', async () => {
    await fetchToken();
    loadBanks();
    loadConfig();
    renderApiExamples();
});
</script>
